# guestbook-ui/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argocd-test
  template:
    metadata:
      labels:
        app: argocd-test
    spec:
      containers:
        - image: gcr.io/google-samples/gb-frontend:v5
          name: argocd-test
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: guestbook-ui
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: guestbook-ui
